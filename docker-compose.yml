services:
  server:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - judge-data:/app/data
    environment:
      - TEE_JUDGE_DB=/app/data/judge.db
      - TEE_JUDGE_SECRET=${TEE_JUDGE_SECRET:?Set TEE_JUDGE_SECRET}
      - TEE_JUDGE_JUDGE_KEY=${TEE_JUDGE_JUDGE_KEY:?Set TEE_JUDGE_JUDGE_KEY}
      - TEE_JUDGE_ENCLAVE_KEY=${TEE_JUDGE_ENCLAVE_KEY:?Set TEE_JUDGE_ENCLAVE_KEY}
      - TEE_JUDGE_ENV=${TEE_JUDGE_ENV:-production}
      - TEE_JUDGE_ALLOW_MOCK=${TEE_JUDGE_ALLOW_MOCK:-0}
      - TEE_JUDGE_MRENCLAVE=${TEE_JUDGE_MRENCLAVE:-}
      - TEE_JUDGE_CORS_ORIGINS=${TEE_JUDGE_CORS_ORIGINS:-}
    restart: unless-stopped

volumes:
  judge-data:
